<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservaciones | RECO2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="sidebar">
    <h2><i class="bi bi-building"></i> RECO2</h2>
    <a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="usuarios.html"><i class="bi bi-people-fill"></i> Usuarios</a>
    <a href="espacios.html"><i class="bi bi-house-door-fill"></i> Espacios</a>
    <a href="reservaciones.html"><i class="bi bi-calendar-check-fill"></i> Reservaciones</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Reservaciones</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#reservationModal">+ Nueva Reservación</button>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Espacio</th>
                            <th>Usuario</th>
                            <th>Inicio</th>
                            <th>Fin</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="reservationTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- MODAL NUEVA RESERVACIÓN -->
<div class="modal fade" id="reservationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Crear Reservación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="number" id="spaceId" class="form-control mb-3" placeholder="ID del Espacio">
                <input type="email" id="userEmail" class="form-control mb-3" placeholder="Correo del Usuario">
                <label class="form-label text-muted small">Fecha de Inicio</label>
                <input type="datetime-local" id="startDay" class="form-control mb-3">
                <label class="form-label text-muted small">Fecha de Cierre</label>
                <input type="datetime-local" id="endDay" class="form-control mb-3">
                <select id="status" class="form-select">
                    <option value="PENDING">PENDING</option>
                    <option value="CONFIRMED">CONFIRMED</option>
                    <option value="CANCELED">CANCELED</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-success" onclick="registerReservation()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
