<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RECO2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="sidebar">
    <h2><i class="bi bi-building"></i> RECO2</h2>
    <a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="usuarios.html"><i class="bi bi-people-fill"></i> Usuarios</a>
    <a href="espacios.html"><i class="bi bi-house-door-fill"></i> Espacios</a>
    <a href="reservaciones.html"><i class="bi bi-calendar-check-fill"></i> Reservaciones</a>
</div>

<div class="content">
    <div class="hero">
        <h1>Bienvenido a RECO2</h1>
        <p>Sistema de Gestión y Reservación de Espacios</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h5>Total Usuarios</h5>
            <h2 id="totalUsers">0</h2>
        </div>
        <div class="stat-card">
            <h5>Total Espacios</h5>
            <h2 id="totalSpaces">0</h2>
        </div>
        <div class="stat-card">
            <h5>Total Reservaciones</h5>
            <h2 id="totalReservations">0</h2>
        </div>
    </div>

    <div class="card shadow mt-4">
        <div class="card-body">
            <h4 class="mb-3">Usuarios Registrados</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Rol</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyUsers"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
