<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacios | RECO2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="sidebar">
    <h2><i class="bi bi-building"></i> RECO2</h2>
    <a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="usuarios.html"><i class="bi bi-people-fill"></i> Usuarios</a>
    <a href="espacios.html"><i class="bi bi-house-door-fill"></i> Espacios</a>
    <a href="reservaciones.html"><i class="bi bi-calendar-check-fill"></i> Reservaciones</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Espacios Disponibles</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#spaceModal">
            <i class="bi bi-plus-circle"></i> Nuevo Espacio
        </button>
    </div>

    <div class="mb-4">
        <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" id="searchSpace" class="form-control border-start-0 ps-0" placeholder="Buscar por nombre, ubicación o tipo..." onkeyup="searchSpaces()">
        </div>
    </div>

    <div id="spacesContainer" class="row">
        </div>
</div>

<div class="modal fade" id="spaceModal" tabindex="-1" aria-labelledby="spaceModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="spaceModalLabel">Registrar Espacio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="spaceName" class="form-control mb-3" placeholder="Nombre del espacio (ej: Sala A)">
                <input type="text" id="location" class="form-control mb-3" placeholder="Ubicación (ej: Piso 2)">
                <input type="text" id="type" class="form-control mb-3" placeholder="Tipo (ej: Conferencia, Estudio)">
                <input type="number" id="price" class="form-control" placeholder="Precio por hora">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-success" onclick="registerSpace()">Guardar Espacio</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editSpaceModal" tabindex="-1" aria-labelledby="editSpaceModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editSpaceModalLabel">Modificar Espacio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editSpaceId">
                
                <input type="text" id="editSpaceName" class="form-control mb-3" placeholder="Nombre">
                <input type="text" id="editLocation" class="form-control mb-3" placeholder="Ubicación">
                <input type="text" id="editType" class="form-control mb-3" placeholder="Tipo">
                <input type="number" id="editPrice" class="form-control" placeholder="Precio">
            </div>
